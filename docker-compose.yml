services:
  postgres_db:
    image: postgres:16-alpine
    container_name: sigea_db
    environment:
      POSTGRES_DB: sigea
      POSTGRES_USER: sigea_user
      POSTGRES_PASSWORD: sigea_pass_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sigea_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigea_user -d sigea"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend_django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigea_backend
    environment:
      PYTHONPATH: /app
      DEBUG: "False"
      SECRET_KEY: django-insecure-sigea2026UNCuyo-secret-key-change-in-production
      DATABASE_NAME: sigea
      DATABASE_USER: sigea_user
      DATABASE_PASSWORD: sigea_pass_2026
      DATABASE_HOST: postgres_db
      DATABASE_PORT: 5432
    command: >
      sh -c "python manage.py migrate &&
             python manage.py shell -c \"from django.contrib.auth.models import User; u, _ = User.objects.get_or_create(username='admin'); u.set_password('admin123'); u.save()\" &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - sigea_network
    expose:
      - "8000"

  frontend_nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sigea_frontend
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - backend_django
    networks:
      - sigea_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  sigea_network:
    driver: bridge
